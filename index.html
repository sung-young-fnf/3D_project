<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VMD Splat Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; color: #ccc; }

    /* 로딩 */
    #loading {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: #000; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #fff; z-index: 100;
    }
    #loading h2 { font-weight: 200; letter-spacing: 0.3em; margin-bottom: 1rem; }
    #loading p { color: #888; font-size: 0.9rem; }
    #loading.hidden { display: none; }

    /* 상단 모드 바 */
    #toolbar {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.4rem; z-index: 10;
      background: rgba(0,0,0,0.7); padding: 0.4rem 0.8rem;
      border-radius: 8px; backdrop-filter: blur(8px);
    }
    .mode-btn {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #aaa; padding: 0.4rem 0.9rem; border-radius: 6px;
      cursor: pointer; font-size: 0.8rem; transition: all 0.15s;
    }
    .mode-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .mode-btn.active { background: rgba(0,180,255,0.25); border-color: #0af; color: #fff; }

    /* 하단 힌트 */
    #mode-hint {
      position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: #999; padding: 0.5rem 1.2rem;
      border-radius: 8px; font-size: 0.78rem; z-index: 10;
      backdrop-filter: blur(8px); letter-spacing: 0.02em;
    }

    /* 좌측 영역 목록 */
    #side-panel {
      position: fixed; top: 4rem; left: 1rem; width: 180px; z-index: 10;
      background: rgba(0,0,0,0.75); border-radius: 8px;
      backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08);
      padding: 0.6rem; font-size: 0.78rem;
    }
    #side-panel h3 {
      font-size: 0.72rem; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem;
    }
    #box-list { max-height: 200px; overflow-y: auto; }
    .box-item {
      padding: 0.35rem 0.5rem; border-radius: 4px; cursor: pointer;
      margin-bottom: 2px; transition: background 0.1s;
    }
    .box-item:hover { background: rgba(255,255,255,0.08); }
    .box-item.active { background: rgba(0,180,255,0.2); color: #fff; }
    .empty-msg { color: #555; font-style: italic; font-size: 0.72rem; }

    /* 우측 속성 패널 */
    #property-panel {
      position: fixed; top: 4rem; right: 1rem; width: 200px; z-index: 10;
      background: rgba(0,0,0,0.75); border-radius: 8px;
      backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08);
      padding: 0.6rem; font-size: 0.78rem;
    }
    #property-panel.hidden { display: none; }
    #property-panel h3 {
      font-size: 0.72rem; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem;
    }
    #prop-name-input {
      width: 100%; padding: 0.35rem 0.5rem; margin-bottom: 0.6rem;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
      color: #fff; border-radius: 4px; font-size: 0.85rem; font-weight: 500;
      outline: none; font-family: inherit;
    }
    #prop-name-input:focus {
      border-color: #0af; background: rgba(255,255,255,0.08);
    }
    #prop-name-input::placeholder { color: #555; }
    .prop-row {
      display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.35rem;
    }
    .prop-row label {
      width: 14px; color: #888; font-weight: 600; font-size: 0.72rem; text-align: right;
    }
    .prop-row input[type="range"] {
      flex: 1; height: 4px; accent-color: #0af;
    }
    .prop-row .val { width: 36px; text-align: right; color: #aaa; font-size: 0.7rem; }
    #disp-value { color: #aaa; font-size: 0.7rem; margin-top: 0.4rem; }
    #btn-delete {
      margin-top: 0.6rem; width: 100%; padding: 0.35rem;
      background: rgba(255,60,60,0.15); border: 1px solid rgba(255,60,60,0.3);
      color: #f66; border-radius: 4px; cursor: pointer; font-size: 0.75rem;
    }
    #btn-delete:hover { background: rgba(255,60,60,0.3); }

    /* Phase 2: 마스크 섹션 */
    .mask-section {
      margin-top: 0.6rem; padding-top: 0.5rem;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .mask-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.35rem;
    }
    .mask-label { color: #aaa; font-size: 0.72rem; font-weight: 500; }
    .mask-status { font-size: 0.68rem; letter-spacing: 0.02em; }
    .mask-status.none    { color: #555; }
    .mask-status.pending { color: #0af; }
    .mask-status.ready   { color: #6c6; }
    .mask-status.error   { color: #f66; }
    .mask-actions {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.3rem;
    }
    .mask-actions button {
      padding: 0.3rem 0.3rem;
      background: rgba(180,120,255,0.14); border: 1px solid rgba(180,120,255,0.32);
      color: #caf; border-radius: 4px; cursor: pointer;
      font-size: 0.68rem; transition: all 0.15s;
    }
    .mask-actions button:hover:not(:disabled) {
      background: rgba(180,120,255,0.28); color: #fff;
    }
    .mask-actions button:disabled { opacity: 0.3; cursor: not-allowed; }

    /* 속성 탭 */
    .prop-tabs {
      display: flex; gap: 0.2rem; margin-bottom: 0.5rem;
      padding-bottom: 0.4rem; border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .prop-tab {
      flex: 1; padding: 0.3rem 0.4rem;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: #888; border-radius: 4px; cursor: pointer;
      font-size: 0.7rem; transition: all 0.15s;
    }
    .prop-tab:hover { background: rgba(255,255,255,0.1); color: #ccc; }
    .prop-tab.active {
      background: rgba(0,180,255,0.2); border-color: #0af; color: #fff;
    }
    .prop-tab-content.hidden { display: none; }

    /* 3D 씬의 박스 라벨 (CSS2DRenderer) */
    .box-label {
      color: #0cf; background: rgba(0,0,0,0.7);
      padding: 0.2rem 0.5rem; border-radius: 4px;
      font-size: 0.72rem; white-space: nowrap;
      pointer-events: none;
      border: 1px solid rgba(0,180,255,0.4);
      font-family: 'Segoe UI', sans-serif;
      letter-spacing: 0.02em;
      user-select: none;
    }
    .box-label.active {
      color: #ff3; background: rgba(40,40,0,0.85);
      border-color: #ff3;
    }

    /* 우하단 Claude 패널 */
    #claude-panel {
      position: fixed; bottom: 1.5rem; right: 1rem; width: 260px; z-index: 10;
      background: rgba(0,0,0,0.75); border-radius: 8px;
      backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08);
      padding: 0.6rem; font-size: 0.78rem;
    }
    #claude-panel h3 {
      font-size: 0.72rem; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem;
    }
    #claude-target {
      width: 100%; padding: 0.35rem 0.5rem; margin-bottom: 0.4rem;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; border-radius: 4px; font-size: 0.78rem; outline: none;
      font-family: inherit;
    }
    #claude-target:focus { border-color: #0af; }
    #claude-target::placeholder { color: #666; }
    .claude-buttons {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 0.4rem; margin-bottom: 0.4rem;
    }
    .claude-buttons button {
      padding: 0.4rem 0.5rem;
      background: rgba(0,180,255,0.15); border: 1px solid rgba(0,180,255,0.3);
      color: #0cf; border-radius: 4px; cursor: pointer;
      font-size: 0.75rem; transition: all 0.15s;
    }
    .claude-buttons button:hover:not(:disabled) {
      background: rgba(0,180,255,0.3); color: #fff;
    }
    .claude-buttons button:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-claude-enhance {
      grid-column: 1 / -1;
      background: rgba(180,120,255,0.18);
      border-color: rgba(180,120,255,0.4);
      color: #caf;
    }
    #btn-claude-enhance:hover:not(:disabled) {
      background: rgba(180,120,255,0.32); color: #fff;
    }

    /* 보정 결과 모달 */
    #enhance-modal { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; }
    #enhance-modal.hidden { display: none; }
    .enhance-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.88); }
    .enhance-content {
      position: relative; z-index: 1;
      max-width: 92vw; max-height: 92vh;
      display: flex; flex-direction: column; gap: 0.7rem;
      padding: 1rem 1rem 0.8rem;
      background: rgba(18,18,22,0.97);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .enhance-close {
      position: absolute; top: 0.4rem; right: 0.6rem;
      background: transparent; border: none;
      color: #888; font-size: 1.5rem; line-height: 1;
      cursor: pointer; padding: 0.3rem;
    }
    .enhance-close:hover { color: #fff; }
    #enhance-img {
      max-width: 100%; max-height: 72vh;
      object-fit: contain; border-radius: 4px;
      background: #000;
    }
    .enhance-meta {
      display: flex; justify-content: space-between; align-items: center;
      gap: 0.8rem; font-size: 0.78rem; color: #888;
    }
    #enhance-info { letter-spacing: 0.02em; }
    #enhance-info.error { color: #f66; }
    .enhance-actions { display: flex; gap: 0.5rem; }
    .enhance-actions button {
      padding: 0.4rem 0.9rem;
      background: rgba(0,180,255,0.15); border: 1px solid rgba(0,180,255,0.3);
      color: #0cf; border-radius: 4px; cursor: pointer;
      font-size: 0.78rem; transition: all 0.15s;
    }
    .enhance-actions button:hover:not(:disabled) {
      background: rgba(0,180,255,0.3); color: #fff;
    }
    .enhance-actions button:disabled { opacity: 0.3; cursor: not-allowed; }
    .enhance-actions button.active { background: rgba(0,180,255,0.4); color: #fff; }
    #claude-status {
      color: #888; font-size: 0.7rem; min-height: 1em;
      letter-spacing: 0.02em;
    }
    #claude-status.loading { color: #0af; }
    #claude-status.error { color: #f66; }
    #claude-status.ok { color: #6c6; }
  </style>
</head>
<body>
  <!-- 로딩 -->
  <div id="loading">
    <h2>Loading</h2>
    <p>Splat 로딩 중...</p>
  </div>

  <!-- 상단 모드 바 -->
  <div id="toolbar">
    <button id="btn-camera" class="mode-btn active">Q 카메라</button>
    <button id="btn-select" class="mode-btn">B 선택</button>
    <button id="btn-move" class="mode-btn">V 이동</button>
    <button id="btn-anchor" class="mode-btn">X 재배치</button>
    <button id="btn-wire" class="mode-btn active" title="Z 키 토글">Z 박스선</button>
  </div>

  <!-- 좌측 영역 목록 -->
  <div id="side-panel">
    <h3>영역 목록</h3>
    <div id="box-list">
      <div class="empty-msg">B키로 영역을 추가하세요</div>
    </div>
  </div>

  <!-- 우측 속성 패널 -->
  <div id="property-panel" class="hidden">
    <h3>속성</h3>
    <input id="prop-name-input" type="text" placeholder="이름" autocomplete="off" />

    <div class="prop-tabs">
      <button class="prop-tab active" data-tab="region">영역 크기</button>
      <button class="prop-tab" data-tab="scale">객체 스케일</button>
    </div>

    <!-- 탭1: 박스 영역 크기 (splat 불변) -->
    <div class="prop-tab-content" data-content="region">
      <div class="prop-row">
        <label>X</label>
        <input type="range" id="size-x" min="0.1" max="3.0" step="0.05" value="0.5" />
        <span class="val" id="val-x">0.50</span>
      </div>
      <div class="prop-row">
        <label>Y</label>
        <input type="range" id="size-y" min="0.1" max="3.0" step="0.05" value="0.5" />
        <span class="val" id="val-y">0.50</span>
      </div>
      <div class="prop-row">
        <label>Z</label>
        <input type="range" id="size-z" min="0.1" max="3.0" step="0.05" value="0.5" />
        <span class="val" id="val-z">0.50</span>
      </div>
    </div>

    <!-- 탭2: 내부 splat 스케일 배율 -->
    <div class="prop-tab-content hidden" data-content="scale">
      <div class="prop-row">
        <label>X</label>
        <input type="range" id="scale-x" min="0.1" max="5.0" step="0.05" value="1.0" />
        <span class="val" id="val-scale-x">1.00</span>
      </div>
      <div class="prop-row">
        <label>Y</label>
        <input type="range" id="scale-y" min="0.1" max="5.0" step="0.05" value="1.0" />
        <span class="val" id="val-scale-y">1.00</span>
      </div>
      <div class="prop-row">
        <label>Z</label>
        <input type="range" id="scale-z" min="0.1" max="5.0" step="0.05" value="1.0" />
        <span class="val" id="val-scale-z">1.00</span>
      </div>
    </div>

    <div style="color:#666; font-size:0.68rem; margin-top:0.5rem;">이동량</div>
    <div id="disp-value">X: 0.00  Y: 0.00  Z: 0.00</div>

    <!-- Phase 2: 마스크 (C 안) -->
    <div class="mask-section">
      <div class="mask-row">
        <span class="mask-label">🎭 마스크</span>
        <span id="mask-status" class="mask-status none">없음</span>
      </div>
      <div class="mask-actions">
        <button id="btn-mask-generate" title="현재 박스 이름으로 Gemini 마스크 생성">생성</button>
        <button id="btn-mask-preview" title="저장된 마스크 미리보기" disabled>미리보기</button>
        <button id="btn-mask-clear" title="마스크 제거" disabled>제거</button>
      </div>
    </div>

    <button id="btn-delete">삭제 (Delete)</button>
  </div>

  <!-- 하단 힌트 -->
  <div id="mode-hint">WASD 이동 | 마우스 시점 변경</div>

  <!-- 우하단 Claude 패널 -->
  <div id="claude-panel">
    <h3>AI 물체 감지</h3>
    <input id="claude-target" type="text" placeholder="찾을 물건 (예: 종이컵)" autocomplete="off" />
    <div class="claude-buttons">
      <button id="btn-claude" disabled>🔍 Claude</button>
      <button id="btn-claude-all">전체</button>
      <button id="btn-claude-cmd" disabled>💬 명령</button>
      <button id="btn-claude-enhance">🎨 보정</button>
    </div>
    <div id="claude-status">idle</div>
  </div>

  <!-- 보정 결과 모달 -->
  <div id="enhance-modal" class="hidden">
    <div class="enhance-backdrop"></div>
    <div class="enhance-content">
      <button class="enhance-close" aria-label="close">×</button>
      <img id="enhance-img" alt="보정 결과" />
      <div class="enhance-meta">
        <span id="enhance-info">idle</span>
        <div class="enhance-actions">
          <button id="btn-enhance-compare" disabled>원본 비교</button>
          <button id="btn-enhance-save" disabled>💾 저장</button>
        </div>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "../spark/node_modules/three/build/three.module.js",
        "three/addons/": "../spark/node_modules/three/examples/jsm/",
        "@sparkjsdev/spark": "../spark/dist/spark.module.js"
      }
    }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
